# BreakAllBlocks Configuration
# Author: MRsuffix

# Enable or disable the entire plugin mechanic
enabled: true

# How many blocks to remove per scheduler tick during a mass-elimination sweep
batch_size: 500

# How many ticks to wait between processing each batch (1 tick = 50ms)
batch_delay_ticks: 1

# Whether to broadcast elimination messages to all online players
broadcast_messages: true

# If true, block break events caused by pistons/explosions also trigger elimination
# Set to false to only react to direct player breaks
count_indirect_breaks: false

# If true, players in Creative mode also trigger elimination
count_creative_breaks: false

# List of world names where BreakAllBlocks is active.
# Leave empty to enable in ALL worlds.
worlds: []

# Materials that are IMMUNE to elimination.
# Add material names (uppercase) from https://jd.papermc.io/paper/1.20/org/bukkit/Material.html
excluded_materials:
  - BEDROCK
  - BARRIER
  - COMMAND_BLOCK
  - CHAIN_COMMAND_BLOCK
  - REPEATING_COMMAND_BLOCK
  - STRUCTURE_BLOCK
  - STRUCTURE_VOID
  - END_PORTAL_FRAME
  - END_PORTAL
  - NETHER_PORTAL
  - AIR
  - CAVE_AIR
  - VOID_AIR

# Messages — supports MiniMessage tags (<red>, <bold>, <gradient:...>, etc.)
messages:
  prefix: "<dark_gray>[<gradient:#FF6B6B:#FFD93D>BreakAllBlocks</gradient>]</dark_gray> "
  elimination_broadcast: "{prefix}<gold><bold>{player}</bold></gold> <red>has destroyed ALL <bold>{block}</bold> in the world! They are gone <italic>forever</italic>.</red>"
  already_eliminated: "{prefix}<red>This block type has already been eliminated from the world.</red>"
  excluded_material: "{prefix}<yellow>This block type is protected and cannot be eliminated.</yellow>"
  plugin_disabled: "{prefix}<gray>BreakAllBlocks is currently disabled.</gray>"
  world_not_active: "{prefix}<gray>BreakAllBlocks is not active in this world.</gray>"
  reload_success: "{prefix}<green>Configuration reloaded successfully.</green>"
  restore_success: "{prefix}<green>Restored <yellow>{block}</yellow>. Players may break it again.</green>"
  restore_not_found: "{prefix}<red><yellow>{block}</yellow> is not in the eliminated list.</red>"
  resetall_success: "{prefix}<green>All eliminated materials have been cleared.</green>"
  list_header: "{prefix}<yellow>Eliminated block types (<gold>{count}</gold>):</yellow>"
  list_empty: "{prefix}<gray>No block types have been eliminated yet.</gray>"
  list_entry: "  <gray>- <white>{block}</white></gray>"
  no_permission: "{prefix}<red>You don't have permission to use this command.</red>"
  usage: "{prefix}<red>Usage: /bab <reload|list|restore <material>|resetall></red>"
  invalid_material: "{prefix}<red>'<yellow>{input}</yellow>' is not a valid material name.</red>"
  scan_started: "{prefix}<aqua>Mass-elimination sweep started for <yellow>{block}</yellow>. Scanning <bold>{chunks}</bold> loaded chunks...</aqua>"
  scan_complete: "{prefix}<green>Sweep complete for <yellow>{block}</yellow>. Removed <bold>{count}</bold> blocks.</green>"
