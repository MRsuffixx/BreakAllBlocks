# BreakAllBlocks Configuration
# Author: MRsuffix | Version: 1.1.0
# Wave-propagation mode: blocks cascade outward from the origin using BFS.

# ──────────────────────────────────────────
#  CORE
# ──────────────────────────────────────────
enabled: true

# ──────────────────────────────────────────
#  WAVE SYSTEM
# ──────────────────────────────────────────

# Blocks broken per scheduler tick. Higher = faster wave, more main-thread work.
# Recommended: 10–20 for survival; 50–200 for events.
wave_speed: 10

# Ticks between each wave processing step (1 tick = 50 ms). Minimum: 1.
wave_tick_interval: 1

# Maximum simultaneous wave tasks. Excess waves queue and auto-start.
max_active_waves: 3

# true  → block.breakNaturally()  (drops loot, plays sound — cinematic!)
# false → block.setType(AIR)      (silent, better for huge waves)
drop_items: true

# ──────────────────────────────────────────
#  UNDO SYSTEM
# ──────────────────────────────────────────

# How many past wave events to keep for /bab undo (in-memory, lost on restart).
undo_history_size: 10

# Max block positions tracked per event. 0 = unlimited (not recommended for common blocks).
# If exceeded the wave continues but undo will be partial.
undo_max_blocks: 100000

# ──────────────────────────────────────────
#  GENERAL SETTINGS
# ──────────────────────────────────────────

broadcast_messages: true
count_indirect_breaks: false
count_creative_breaks: false

# Active worlds (empty = all worlds).
worlds: []

# Materials IMMUNE to elimination (config-level; use /bab exclude for runtime).
excluded_materials:
  - BEDROCK
  - BARRIER
  - COMMAND_BLOCK
  - CHAIN_COMMAND_BLOCK
  - REPEATING_COMMAND_BLOCK
  - STRUCTURE_BLOCK
  - STRUCTURE_VOID
  - END_PORTAL_FRAME
  - END_PORTAL
  - NETHER_PORTAL
  - AIR
  - CAVE_AIR
  - VOID_AIR
  - WATER
  - LAVA

# ──────────────────────────────────────────
#  MOB KILL → BLOCK MAPPINGS
# ──────────────────────────────────────────
# When a player kills the listed entity type, waves are started for every
# mapped block material. Remove entries or leave the list empty to disable.
entity_block_mappings:
  COW:             [GRASS_BLOCK, DIRT]
  SHEEP:           [WHITE_WOOL, GRASS_BLOCK]
  PIG:             [DIRT, COARSE_DIRT]
  CHICKEN:         [EGG, WHEAT_SEEDS]
  CREEPER:         [STONE, COBBLESTONE]
  ZOMBIE:          [DIRT, GRAVEL]
  SKELETON:        [BONE_BLOCK, CALCITE]
  ENDERMAN:        [END_STONE, OBSIDIAN]
  SPIDER:          [COBWEB, BROWN_MUSHROOM_BLOCK]
  BLAZE:           [NETHERRACK, MAGMA_BLOCK]
  WITHER_SKELETON: [BLACKSTONE, BASALT]
  WITCH:           [MUSHROOM_STEM, RED_MUSHROOM_BLOCK]
  DROWNED:         [SAND, SANDSTONE]
  HUSK:            [SAND, DEAD_BUSH]
  SLIME:           [SLIME_BLOCK, MOSS_BLOCK]
  MAGMA_CUBE:      [MAGMA_BLOCK, NETHERRACK]
  GUARDIAN:        [PRISMARINE, SEA_LANTERN]
  ELDER_GUARDIAN:  [PRISMARINE_BRICKS, DARK_PRISMARINE]
  SHULKER:         [PURPUR_BLOCK, END_STONE_BRICKS]
  PILLAGER:        [DARK_OAK_PLANKS, COBBLESTONE]
  RAVAGER:         [STONE_BRICKS, CRACKED_STONE_BRICKS]

# ──────────────────────────────────────────
#  MESSAGES  (MiniMessage format)
# ──────────────────────────────────────────
messages:
  prefix: "<dark_gray>[<gradient:#FF6B6B:#FFD93D>BreakAllBlocks</gradient>]</dark_gray> "

  elimination_broadcast: "{prefix}<gold><bold>{player}</bold></gold> <red>shattered every <bold>{block}</bold>! A destruction wave is spreading... gone <italic>forever</italic>.</red>"

  mob_kill_broadcast: "{prefix}<gold><bold>{player}</bold></gold> <red>slew a <bold>{entity}</bold>! All <bold>{block}</bold> now crumble...</red>"

  already_eliminated: "{prefix}<red>This block type has already been eliminated from the world.</red>"

  excluded_material: "{prefix}<yellow>This block type is protected and cannot be eliminated.</yellow>"

  plugin_disabled: "{prefix}<gray>BreakAllBlocks is currently disabled.</gray>"

  world_not_active: "{prefix}<gray>BreakAllBlocks is not active in this world.</gray>"

  wave_active: "{prefix}<aqua>A wave for <yellow>{block}</yellow> is already spreading — your break was merged.</aqua>"

  reload_success: "{prefix}<green>Configuration reloaded.</green>"

  restore_success: "{prefix}<green>Restored <yellow>{block}</yellow>. Players can break it again.</green>"

  restore_not_found: "{prefix}<red><yellow>{block}</yellow> is not in the eliminated list.</red>"

  resetall_success: "{prefix}<green>All eliminated materials have been cleared.</green>"

  list_header: "{prefix}<yellow>Eliminated materials (<gold>{count}</gold>):</yellow>"

  list_empty: "{prefix}<gray>No block types have been eliminated yet.</gray>"

  list_entry: "  <gray>- <white>{block}</white></gray>"

  no_permission: "{prefix}<red>You don't have permission.</red>"

  usage: "{prefix}<red>Usage: /bab <help|list|status|reload|restore|resetall|waves|exclude|include|undo></red>"

  invalid_material: "{prefix}<red>'<yellow>{input}</yellow>' is not a valid Minecraft material.</red>"

  scan_started: "{prefix}<aqua>Startup cleanup wave started for <yellow>{block}</yellow>...</aqua>"

  scan_complete: "{prefix}<green>Wave complete for <yellow>{block}</yellow>. <bold>{count}</bold> blocks destroyed.</green>"

  undo_broadcast: "{prefix}<aqua><bold>{admin}</bold> reversed the elimination of <yellow>{block}</yellow>. Blocks restored.</aqua>"

  exclude_success: "{prefix}<green><yellow>{block}</yellow> is now protected at runtime. Use /bab include to undo.</green>"

  include_success: "{prefix}<green>Runtime protection removed from <yellow>{block}</yellow>.</green>"

  material_not_excluded: "{prefix}<red><yellow>{block}</yellow> is not in the runtime exclusion list.</red>"
