name: BreakAllBlocks
version: 1.1.0
main: com.mrsuffix.breakallblocks.BreakAllBlocks
api-version: "1.21"
author: MRsuffix
description: >-
  Break any block and a BFS wave destroys every connected block of that type.
  Kill a mob and its mapped block types begin crumbling. Permanent. Irreversible.

commands:
  bab:
    description: BreakAllBlocks admin & info commands
    usage: /bab <help|list|status|reload|restore|resetall|waves|exclude|include|undo> [args]
    permission: breakallblocks.admin
    aliases: [breakallblocks, bab]

permissions:
  breakallblocks.admin:
    description: Access to all /bab admin commands
    default: op

  breakallblocks.use:
    description: Player can trigger block eliminations by breaking blocks
    default: true

  breakallblocks.bypass:
    description: Player can break any block regardless of elimination status
    default: op
