name: BreakAllBlocks
version: '${project.version}'
main: com.mrsuffix.breakallblocks.BreakAllBlocks
api-version: '1.20'
author: MRsuffix
description: When a player breaks a block, every block of that type is removed from the world — forever.

commands:
  bab:
    description: BreakAllBlocks admin command
    usage: /bab <reload|list|restore|resetall> [material]
    permission: breakallblocks.admin
    aliases: [breakallblocks]

permissions:
  breakallblocks.admin:
    description: Access to all /bab admin commands
    default: op
  breakallblocks.bypass:
    description: Bypass the block-break restriction (can still break eliminated blocks)
    default: false
  breakallblocks.use:
    description: Trigger block-type elimination on break
    default: true
